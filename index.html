<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Analog Jakarta (WIB)</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="jam-analog">
        <div class="jarum jam"></div>
        <div class="jarum menit"></div>
        <div class="jarum detik"></div>
        <div class="tengah"></div>
    </div>

    <!-- === POTONG DARI SINI UNTUK MENGHAPUS GAMBAR PERSIB === -->
    <div id="overlay-persib" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: transparent;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        pointer-events: none;
    ">
        <img src="Persib.jpeg" alt="Persib Juara" style="
            width: 320px;
            height: 320px;
            object-fit: cover; /* Melakukan crop otomatis */
            object-position: center; /* Memastikan bagian tengah tidak terpotong */
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            /* BORDER-RADIUS: 50% TELAH DIHAPUS - Gambar sekarang persegi */
        ">
    </div>
    <!-- ====================================================== -->

    <script src="script.js"></script> 
</body>
</html>
